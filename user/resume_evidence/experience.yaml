- id: daros-lab-umass-amherst
  name: DARoS Lab, UMass Amherst
  role: Robotics Researcher
  summary: As an undergraduate researcher at DARos Lab, I have mainly worked on SLAM
    and human foundation model. My main project is training a navigation policy for
    a quadruped robot (Mini Cheetah) to achieve human following + obstacle avoidance.
    We primarily use the CEAR dataset and composite synthetic human data onto it to
    provide training data for depth and RGB images.
  highlights:
  - Designed a robotics dataset augmentation pipeline to generate RGB-D training data
    with realistic synthetic human integration.
  - Processed and transformed visual and spatial data for machine-learning workflows,
    emphasizing data integrity and reproducible experimental outputs
  - Worked with robotics perception, navigation, and sim-to-real pipelines requiring
    structured analysis of noisy sensor data.
  - Using the RGB/depth compositing pipeline, along with ground-truth poses of robot,
    I designed the training framework to predict robot future waypoints thus train
    navigation policy to follow human and avoid obstacles.
  - Working on 3D gaussian splatting + geometry restriction to achieve photorealistic
    rendering and provide sim to real environments for future training purposes
