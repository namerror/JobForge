- id: resume-generator
  name: Resume Generator
  summary: An evidence-based grounded resume generation microservice.
  highlights:
  - Implement baseline, embeddings, and LLM based methods for skills selection
  - Implement rigorous evaluation harness through token efficiency metrics, case-based
    evaluation and llm enabled evaluation
  - Agentic automatic testing for generation strategies
  - Grounded synthesis/extraction of evidence into structured data
  - FastAPI service exposes separate endpoints for skill selection, project selection,
    job-focus derivation, bullet generation, and link-evidence enrichment; startup
    loads registered resume evidence into application state.
  - Resume evidence uses strict Pydantic-backed YAML schemas with deterministic loading;
    the CLI stages CRUD edits in memory, validates before mutation, and applies changes
    through atomic disk writes.
  - The generation pipeline calls the running backend over HTTP for selection, job-focus
    derivation, and bullet generation, then writes an intermediate JSON resume result
    and renders LaTeX, with optional PDF output via local latexmk.
  - Implemented a stage cache that derives SHA-256 keys from canonical JSON payloads,
    validates cached entry version/stage/key before use, supports force refresh and
    namespaces, and atomically replaces cache files after writes.
  - Implemented lightweight service observability through a metrics endpoint reporting
    request and error totals, average latency, model-token usage, effective method
    usage, and per-subsystem snapshots.
  - Added API-level tests using an in-process HTTPX ASGI transport for link enrichment
    and bullet generation, including configurable output counts, token-accounting
    assertions, schema rejection cases, and LLM-failure responses mapped to HTTP 502.
  active: true
  skills:
    technology:
    - FastAPI
    - pydantic
    programming:
    - Python
    concepts:
    - LLM
    - information retrieval
    - API
    - Caching
    - data validation
    - data processing
    - logging
  links:
  - https://github.com/namerror/JobForge
- id: capital-ready-business-lending-tool
  name: Capital Ready - Business Lending Tool
  summary: This is a fullstack web app that I developed for a non-profit to enable
    a platform for microfinancing. The web app can be used by applicant who wish to
    apply for funds, lenders who are willing to invest, and admins who supervise the
    deal pipeline. This tool is currently being used in especially low income areas
    like Syria, Afghanistan to help local businesses grow through microfinancing.
  highlights:
  - Developed FastAPI backend to handle REST requests
  - Defined core data schemas, models for deal applications, deal/pipeline stages,
    user roles etc.
  - Handle auth + role-based access to separate lender, applicant and admin with Supabase
    auth
  - Created dashboards for applicants, lenders and admins
  - Developed AI analysis pipeline that analyzes and evaluates applications to provide
    insights to lenders/admins on the risk level of the investment
  - Using NextJS frontend
  - Using Supabase DB
  - 'Allow workflow: applicant drafts -> form submission -> admin screening & review
    -> admin rejection/acceptance -> lender side view and handle lender and applicant
    closing deal agreement'
  - Interest matching between lenders and applicants with filtering on region, industry
    and funding ranges etc. performed automatically by algorithm
  - Public landing page presents CapitalReady as an AI-powered business lending platform
    supporting an application-to-funding workflow.
  - Applicant intake is implemented as a guided, step-by-step form that collects business
    information, financials, and founder background for lender review.
  - The platform describes an AI analysis stage that produces executive summaries,
    strengths-and-weaknesses assessments, risk flags, and revision checklists for
    submitted applications.
  - Capital matching considers industry, location, risk profile, and funding needs
    when connecting applicants with lenders.
  - 'The product flow is organized into three stages: guided application, AI analysis,
    and capital matching.'
  - The landing page states an average AI analysis time of two minutes and positions
    the assessment as covering both risk and business strengths.
  active: true
  skills:
