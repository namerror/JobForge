- id: hackproof-decentralized-reputation-system-for-hackers
  name: HackProof - Decentralized Reputation System for Hackers
  summary: HackProof is a platform I developed at HackUMass XIII hackathon that won
    the MLH "Best Use of Solana" award. The idea is a decentralized voting system
    for hackathon participants/hackers to assess each other's projects, each participant
    is issued $HCKPRF tokens to motivate community assessment on projects. The idea
    is that hackathon judges shouldn't have so much power and control in project assessment
    but decentralized voting systems ensure fairness.
  highlights:
  - Use smart contracts to mint tokens and develop the backend logic for Solana
  - Use NextJS frontend.
  - Rust/Anchor Solana program initializes a hackathon PDA with an admin, voting-phase
    state, and a dedicated voting-token mint.
  - Participant registration stores wallet authority and metadata URI on-chain, creates
    a participant NFT through Metaplex Token Metadata, and issues an initial allocation
    of 100 voting tokens.
  - "Project creation accepts project metadata and a GitHub repository reference,\
    \ validates team size from 1\u201310, creates project state, and associates the\
    \ creator's participant record with the project."
  - Token-based voting enforces positive vote amounts, blocks voting for a participant's
    own project, requires submitted projects and sufficient token balance, transfers
    tokens into the project account, and uses checked arithmetic for vote totals.
  - Next.js Solana integration deterministically derives hackathon, participant, project,
    and voting-mint PDAs; creates associated token accounts; and submits project-creation
    and token-voting transactions through program RPC calls.
  - Shared TypeScript library centralizes IPFS upload/download, NFT metadata templates,
    image URL helpers, metadata/storage types, and a storage test suite for use by
    both the frontend and Solana-program workflow.
  active: true
  skills:
    technology:
    - Solana
    - NextJS
    - Vercel
    programming:
    - Rust
    - TypeScript
    concepts:
    - Blockchain
    - Smart Contracts
  links:
  - https://github.com/namerror/HackProof-prototype
- id: kim-1-trivia-game
  name: KIM-1 Trivia Game
  summary: This is a trivia game that runs on the KIM-1 6502 computer. I developed
    the code in machine code and assembly and used an LCD to display the questions
    and uesed a python program to write the question and answers into the memory of
    the KIM-1. The scoring and display logic is completely handled by 6502.
  highlights:
  - Designed and programmed a Trivia game with assembly code, running on the 6502-based
    KIM-1 computer.
  - Used SPI to connect the KIM-1 I/O ports to a 4*20 LCD to display the game.
  - Wrote a Python script to automate data generation and achieve manual page breaks
    on the LCD with simple text editing.
  - Optimized memory usage using assigned pointers and indirect addressing with registers.
  - Implements a software-driven SPI byte-transfer routine that shifts eight bits
    through KIM-1 output pins, controls MOSI, slave-select, and clock signals, and
    restores slave-select after each transfer.
  - Configures KIM-1 Port A as output for the LCD interface and Port B as input for
    keypad polling during initialization.
  - 'Implements the game interaction loop in 6502 assembly: display a question page,
    wait for keypad input, display the option page, compare the captured answer against
    an answer key, and render correct/incorrect feedback.'
  - Stores display-page data and answer keys in separate assembly memory regions and
    advances the answer pointer with carry handling between questions.
  - Python content generator preserves whole words while wrapping text to 20-character
    lines, accepts `---` as a manual page separator, and limits generated LCD pages
    to four display lines.
  - Generates assembler `.byte` directives for LCD cursor-address commands and null-terminated
    page data, then writes the generated content to `file.txt` for inclusion by the
    assembly program.
  active: true
  skills:
    technology:
    - SPI
    programming:
    - ASM
    - Python
    concepts:
    - Hardware Development
    - Single-board Computer
  links:
  - https://github.com/namerror/KIM-1-Trivia-Game
