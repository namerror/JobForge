- id: 2d-slam-robot
  name: 2D SLAM Robot
  summary: This project is a prototype of a low-cost 2D SLAM (Simultaneous Localization
    and Mapping) robot designed to navigate and map a maze-like environment. The robot
    is built using affordable components, including an ultrasonic distance sensor
    for mapping nearby walls and an IMU (Inertial Measurement Unit) for estimating
    its position and orientation. The collected sensor data is streamed to a laptop,
    where a live visualization displays a rough 2D map of the maze in real time. This
    project serves as a proof of concept for using simple robotics and sensing technologies
    to achieve real-time environmental mapping without relying on expensive sensors
    or complex algorithms.
  highlights:
  - Designed schematics diagram with KiCAD from scratch for the robot wiring including
    the battery, microcontroller, motors, motor driver
  - Programmed the communication interface between laptop and ESP32 to enable I2C
    control with keyboard
  - Use various filtering and smoothing techniques to optimize map generated with
    only one distance sensor, including using IMU to calculate angular velocity to
    estimate robot rotation, using dead reckoning for pose estimation, using averaged
    filter queue to sample accurate data, using slow ramp up/down speed to avoid sudden
    acceleration that introduces noise to data.
  - Programmed a visualization software in python to enable control interface and
    map visualization.
  - Firmware implements a newline-delimited serial command protocol for forward, backward,
    left, right, brake, stop, PWM-speed, IMU-requirement, calibration, and wheel-ramp
    controls; it also emits timestamped IMU, distance, and status telemetry.
  - Motor commands are blocked while IMU calibration is running or, when required,
    until calibration succeeds; calibration samples accelerometer/gyro readings, rejects
    unstable measurements, computes a Z-axis gyro bias, and resets yaw.
  - 'Implemented two selectable no-encoder pose-estimation paths: command-based differential-drive
    estimation derived from wheel diameter, track width, motor RPM, and PWM scaling;
    and IMU-based estimation from acceleration and gyro samples.'
  - Externalized serial settings, control timing, PWM/braking behavior, sensor mounting
    offset, wheel-ramp settings, and pose-estimation parameters into YAML configuration
    rather than hard-coding robot-specific assumptions.
  - Built a Pygame map view that renders a grid, robot pose and heading, ultrasonic
    sensor beam, and accumulated angled-wall detections; auto-scan adds wall points
    only after movement exceeds a threshold and enforces a scan cooldown.
  - Added automated Python tests covering configuration loading, wheel-ramp validation,
    serial control-command behavior, and both command-based and IMU-based pose-estimator
    modes.
  active: true
  skills:
    technology:
    - Arduino
    - ESP32
    - I2C
    - PlatformIO
    programming:
    - Python
    - C++
    concepts:
    - SLAM
    - IMU
    - Hardware Computing
    - Robot Control
    - Differential Drive
    - Data Streaming
  links:
