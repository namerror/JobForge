- id: capital-ready-business-lending-tool
  name: Capital Ready - Business Lending Tool
  summary: This is a fullstack web app that I developed for a non-profit to enable
    a platform for microfinancing. The web app can be used by applicant who wish to
    apply for funds, lenders who are willing to invest, and admins who supervise the
    deal pipeline. This tool is currently being used in especially low income areas
    like Syria, Afghanistan to help local businesses grow through microfinancing.
  highlights:
  - Developed FastAPI backend to handle REST requests
  - Defined core data schemas, models for deal applications, deal/pipeline stages,
    user roles etc.
  - Handle auth + role-based access to separate lender, applicant and admin with Supabase
    auth
  - Created dashboards for applicants, lenders and admins
  - Developed AI analysis pipeline that analyzes and evaluates applications to provide
    insights to lenders/admins on the risk level of the investment
  - Using NextJS frontend
  - Using Supabase DB
  - 'Allow workflow: applicant drafts -> form submission -> admin screening & review
    -> admin rejection/acceptance -> lender side view and handle lender and applicant
    closing deal agreement'
  - Interest matching between lenders and applicants with filtering on region, industry
    and funding ranges etc. performed automatically by algorithm
  active: true
  skills:
    technology:
    - FastAPI
    - Supabase
    - NextJS
    - Pydantic
    - Docker
    programming:
    - Python
    - TypeScript
    - SQL
    concepts:
